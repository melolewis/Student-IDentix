<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDentix – Step 1</title>
    <link rel="stylesheet" href="./CSS/bootstrap.min.css">
    <link rel="stylesheet" href="./CSS/style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <style>
        /* ── Step Indicator ── */
        .stepper-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 16px 10px;
            gap: 0;
        }

        .stepper-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
            max-width: 140px;
        }

        /* Connector line between circles */
        .stepper-step:not(:last-child)::after {
            content: "";
            position: absolute;
            top: 20px;
            left: calc(50% + 20px);
            width: calc(100% - 40px);
            height: 3px;
            background: #ddd;
            z-index: 0;
            transition: background 0.4s ease;
        }

        .stepper-step.completed:not(:last-child)::after {
            background: blueviolet;
        }

        /* Circle */
        .stepper-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: #aaa;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .stepper-step.active .stepper-circle {
            border-color: blueviolet;
            background: blueviolet;
            color: #fff;
            box-shadow: 0 0 0 5px rgba(138, 43, 226, 0.18);
        }

        .stepper-step.completed .stepper-circle {
            border-color: blueviolet;
            background: blueviolet;
            color: #fff;
        }

        /* Label */
        .stepper-label {
            margin-top: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            text-align: center;
            line-height: 1.3;
        }

        .stepper-step.active .stepper-label {
            color: blueviolet;
        }

        .stepper-step.completed .stepper-label {
            color: blueviolet;
        }

        /* Progress bar below stepper */
        .stepper-progress-bar {
            height: 5px;
            background: #eee;
            border-radius: 10px;
            margin: 6px auto 18px;
            max-width: 600px;
            width: 90%;
        }

        .stepper-progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, blueviolet, #9b59b6);
            transition: width 0.5s ease;
        }

        /* Mobile: hide labels on very small screens */
        @media (max-width: 400px) {
            .stepper-label { display: none; }
            .stepper-circle { width: 34px; height: 34px; font-size: 13px; }
            .stepper-step:not(:last-child)::after { top: 16px; }
        }
    </style>
</head>
<body>

    
    <!-- ── Page Header ── -->
    <div class="row">
        <div class="col-md-12 text-center">
            <img class="w-50" src="./images/IMG-20260421-WA0116-removebg-preview.png" alt="" height="300px">
            <h1 style="font-size: 40px; color: blueviolet;">Create your ID card</h1>
            <p style="font-size: 25px;">Enter clear informations for your ID card</p>
            <p style="font-size: 20px;">You are required to fill all the informations</p>
        </div>
    </div>

    <!-- ── Step Indicator ── -->
    <div class="container-fluid px-0">
        <div class="stepper-wrapper">

            <div class="stepper-step completed">
                <div class="stepper-circle"><i class="fa-solid fa-check" style="font-size:14px;"></i></div>
                <div class="stepper-label">Personal<br>Info</div>
            </div>

            <div class="stepper-step">
                <div class="stepper-circle">2</div>
                <div class="stepper-label">Institution<br>Info</div>
            </div>

            <div class="stepper-step">
                <div class="stepper-circle">3</div>
                <div class="stepper-label">Address<br>Info</div>
            </div>

            <div class="stepper-step">
                <div class="stepper-circle">4</div>
                <div class="stepper-label">Emergency<br>& Photo</div>
            </div>

        </div>

        <!-- Progress bar: 1 of 4 = 12.5% (half of first step) -->
        <div class="stepper-progress-bar">
            <div class="stepper-progress-fill" style="width: 12.5%;"></div>
        </div>
    </div>


    <!-- ── Form ── -->
    <div class="row justify-content-center p-4">
        <div style="border: 2px solid rgb(66, 21, 108); border-radius: 10px;" class="col-md-10 text-black p-4 p-md-5">
            <form id="step1Form" novalidate>
                <h3 style="color: rgb(108, 34, 176);">Personal informations</h3>

                <div class="mt-3 p-2">
                    <label for="firstname">Enter your first Name <i style="color: blueviolet;" class="fa-solid fa-user"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="firstname" id="firstname" placeholder="Doe">
                </div>
                <div class="mt-3 p-2">
                    <label for="secondname">Enter your second Name <i style="color: blueviolet;" class="fa-solid fa-user"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="secondname" id="secondname" placeholder="John">
                </div>
                <div class="mt-3 p-2">
                    <label for="email">Enter your Email <i style="color: blueviolet;" class="fa-solid fa-envelope"></i> <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" name="email" id="email" placeholder="johndoe@gmail.com">
                </div>
                <div class="mt-3 p-2">
                    <label for="contact">Enter your phone number <i style="color: blueviolet;" class="fa-solid fa-phone"></i> <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" name="contact" id="contact" placeholder="677123456">
                </div>
                <div class="mt-3 p-2">
                    <label for="date">Enter your date of birth <i style="color: blueviolet;" class="fa-solid fa-calendar-days"></i> <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" name="date" id="date">
                </div>
                <div class="mt-3 p-2">
                    <label for="place">Enter your place of birth <i style="color: blueviolet;" class="fa-solid fa-location-dot"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="place" id="place" placeholder="Yaounde">
                </div>
                <div class="mt-3 p-2">
                    <label for="gender">Choose your gender <span class="text-danger">*</span></label>
                    <select class="form-control" name="gender" id="gender">
                        <option value="">-- Select --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="mt-4 text-center d-flex justify-content-center gap-3 flex-wrap">
                    <a href="index2.html">
                        <button type="button" style="background: rgb(97, 27, 163);" class="btn text-white px-4">
                            <i class="fa-solid fa-arrow-left"></i> Back
                        </button>
                    </a>
                    <button type="submit" style="background: rgb(97, 27, 163);" class="btn text-white px-4">
                        Next <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/jquery.slim.min.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
