<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated ID Card</title>
    <link rel="stylesheet" href="./CSS/bootstrap.min.css">

    <style>
        body {
            background: #f4f4f4;
            padding: 40px;
        }

        .id-card {
            width: 420px;
            margin: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 3px solid blueviolet;
        }

        .header {
            background: blueviolet;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .photo {
            text-align: center;
            margin-top: 20px;
        }

        .photo img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid blueviolet;
        }

        .details {
            padding: 25px;
        }

        .details p {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .print-btn {
            text-align: center;
            margin: 30px;
        }
    </style>
</head>
<body>

<div class="id-card">
    <div class="header">
        <h2>STUDENT ID CARD</h2>
    </div>

    <div class="photo">
        <img id="studentPhoto" src="" alt="Student Photo">
    </div>

    <div class="details">
        <p><strong>Name:</strong> <span id="studentName"></span></p>
        <p><strong>School:</strong> <span id="studentSchool"></span></p>
        <p><strong>Department:</strong> <span id="studentDepartment"></span></p>
        <p><strong>Level:</strong> <span id="studentLevel"></span></p>
        <p><strong>Phone:</strong> <span id="studentContact"></span></p>
        <p><strong>City:</strong> <span id="studentCity"></span></p>
    </div>

    <div class="print-btn">
        <button onclick="window.print()" class="btn btn-primary">
            Print ID Card
        </button>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
