<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDentix – Step 2</title>
    <link rel="stylesheet" href="./CSS/bootstrap.min.css">
    <link rel="stylesheet" href="./CSS/style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <style>
        .stepper-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 16px 10px;
            gap: 0;
        }
        .stepper-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
            max-width: 140px;
        }
        .stepper-step:not(:last-child)::after {
            content: "";
            position: absolute;
            top: 20px;
            left: calc(50% + 20px);
            width: calc(100% - 40px);
            height: 3px;
            background: #ddd;
            z-index: 0;
            transition: background 0.4s ease;
        }
        .stepper-step.completed:not(:last-child)::after {
            background: blueviolet;
        }
        .stepper-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: #aaa;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        .stepper-step.active .stepper-circle {
            border-color: blueviolet;
            background: blueviolet;
            color: #fff;
            box-shadow: 0 0 0 5px rgba(138, 43, 226, 0.18);
        }
        .stepper-step.completed .stepper-circle {
            border-color: blueviolet;
            background: blueviolet;
            color: #fff;
        }
        .stepper-label {
            margin-top: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            text-align: center;
            line-height: 1.3;
        }
        .stepper-step.active .stepper-label  { color: blueviolet; }
        .stepper-step.completed .stepper-label { color: blueviolet; }
        .stepper-progress-bar {
            height: 5px;
            background: #eee;
            border-radius: 10px;
            margin: 6px auto 18px;
            max-width: 600px;
            width: 90%;
        }
        .stepper-progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, blueviolet, #9b59b6);
            transition: width 0.5s ease;
        }
        @media (max-width: 400px) {
            .stepper-label { display: none; }
            .stepper-circle { width: 34px; height: 34px; font-size: 13px; }
            .stepper-step:not(:last-child)::after { top: 16px; }
        }
    </style>
</head>
<body>

    
    <!-- ── Page Header ── -->
    <div class="row">
        <div class="col-md-12 text-center">
            <img class="w-50" src="./images/IMG-20260421-WA0116-removebg-preview.png" alt="" height="350px">
            <h1 style="font-size: 40px; color: blueviolet;">Create your ID card</h1>
            <p style="font-size: 25px;">Enter clear informations for your ID card</p>
            <p style="font-size: 20px;">You are required to fill all the informations</p>
        </div>
    </div>

    <!-- ── Step Indicator ── -->
    <div class="container-fluid px-0">
        <div class="stepper-wrapper">

            <div class="stepper-step completed">
                <div class="stepper-circle"><i class="fa-solid fa-check" style="font-size:14px;"></i></div>
                <div class="stepper-label">Personal<br>Info</div>
            </div>

            <div class="stepper-step active">
                <div class="stepper-circle">2</div>
                <div class="stepper-label">Institution<br>Info</div>
            </div>

            <div class="stepper-step">
                <div class="stepper-circle">3</div>
                <div class="stepper-label">Address<br>Info</div>
            </div>

            <div class="stepper-step">
                <div class="stepper-circle">4</div>
                <div class="stepper-label">Emergency<br>& Photo</div>
            </div>

        </div>

        <!-- Progress: 2 of 4 = 37.5% -->
        <div class="stepper-progress-bar">
            <div class="stepper-progress-fill" style="width: 37.5%;"></div>
        </div>
    </div>


    <!-- ── Form ── -->
    <div class="row justify-content-center p-4">
        <div style="border: 2px solid rgb(66, 21, 108); border-radius: 10px;" class="col-md-10 text-black p-4 p-md-5">
            <form id="step2Form" novalidate>
                <h3 style="color: rgb(108, 34, 176);">Institution informations</h3>

                <div class="mt-3 p-2">
                    <label for="school">Institution name <i style="color: blueviolet;" class="fa-solid fa-building-columns"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="school" id="school" placeholder="YIBS">
                </div>
                <div class="mt-3 p-2">
                    <label for="Department">Department <i style="color: blueviolet;" class="fa-solid fa-building-user"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="Department" id="Department" placeholder="Computer Engineering">
                </div>
                <div class="mt-3 p-2">
                    <label for="campus">Campus <i style="color: blueviolet;" class="fa-solid fa-building-columns"></i> <span class="text-danger">*</span></label>
                    <select class="form-control" name="campus" id="campus">
                        <option value="">-- Select --</option>
                        <option value="Campus A">Campus A</option>
                        <option value="Campus B">Campus B</option>
                    </select>
                </div>
                <div class="mt-3 p-2">
                    <label for="specialty">Specialty <i style="color: blueviolet;" class="fa-brands fa-superpowers"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="specialty" id="specialty" placeholder="Software Engineering">
                </div>
                <div class="mt-3 p-2">
                    <label for="level">Level <i style="color: blueviolet;" class="fa-solid fa-street-view"></i> <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="level" id="level" placeholder="HND1">
                </div>

                <div class="mt-4 text-center d-flex justify-content-center gap-3 flex-wrap">
                    <a href="register1.html">
                        <button type="button" style="background: rgb(97, 27, 163);" class="btn text-white px-4">
                            <i class="fa-solid fa-arrow-left"></i> Back
                        </button>
                    </a>
                    <button type="submit" style="background: rgb(97, 27, 163);" class="btn text-white px-4">
                        Next <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/jquery.slim.min.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
